<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D1A">
<title>RO Pre-Renewal DB</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #0D0D1A;
    --bg-card:    #141428;
    --bg-elevated:#1C1C38;
    --gold:       #F5A623;
    --gold-dim:   #8A5C12;
    --rune-blue:  #4A90D9;
    --border:     #2A2A4A;
    --divider:    #1E1E3A;
    --text-1:     #E8E8F0;
    --text-2:     #8888AA;
    --text-muted: #444466;
    --fire:   #E84040; --water: #4096E8; --wind:  #48C774;
    --earth:  #A0804A; --holy:  #FFF08A; --shadow:#9B59B6;
    --poison: #2ECC71; --undead:#95A5A6; --ghost: #7F8C8D;
    --neutral:#BDC3C7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg-deep); color: var(--text-1); font-family: 'Roboto', sans-serif; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #topbar {
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  #topbar-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  #refresh-btn {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-2); padding: 5px 8px;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  #search-bar {
    display: flex;
    align-items: center;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    margin-bottom: 10px;
  }
  #search-bar svg { color: var(--text-muted); flex-shrink: 0; }
  #search-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-1); font-size: 14px; padding: 10px 8px;
    font-family: 'Roboto', sans-serif;
  }
  #search-input::placeholder { color: var(--text-muted); }
  #clear-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: none; }

  /* Filtres */
  #filters {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
    scrollbar-width: none;
  }
  #filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 11px;
    border: 1px solid var(--border); background: var(--bg-elevated);
    color: var(--text-2); cursor: pointer; transition: all .15s; white-space: nowrap;
    font-family: 'Roboto', sans-serif;
  }
  .filter-chip.active { font-weight: 600; }

  /* ── Content ── */
  #content { flex: 1; overflow-y: auto; }
  #list-view, #detail-view, #init-view { min-height: 100%; }
  #detail-view, #init-view { display: none; }

  /* ── Init / indexing screen ── */
  #init-view {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center; min-height: 60vh;
  }
  #init-view.show { display: flex; }
  .init-icon { font-size: 40px; margin-bottom: 16px; }
  .init-title {
    font-family: 'Press Start 2P', monospace; font-size: 11px;
    color: var(--gold); margin-bottom: 10px; letter-spacing: 1px;
  }
  .init-text { font-size: 13px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; max-width: 320px; }
  .progress-bar-bg {
    width: 100%; max-width: 280px; height: 8px; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 10px;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold); border-radius: 4px; width: 0%;
    transition: width .15s;
  }
  @keyframes pulse { from { opacity: .4; } to { opacity: 1; } }
  .progress-label { font-size: 11px; color: var(--text-muted); }

  /* ── Liste ── */
  #list-container { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .monster-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; cursor: pointer;
    transition: border-color .15s;
  }
  .monster-card:active { border-color: var(--gold); }
  .sprite-box {
    width: 58px; height: 58px; flex-shrink: 0;
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-size: 22px;
  }
  .sprite-box img { image-rendering: pixelated; max-width: 52px; max-height: 52px; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .card-chips { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
  .chevron { color: var(--text-muted); flex-shrink: 0; }

  /* ── Chips ── */
  .chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    border: 1px solid; white-space: nowrap;
  }

  /* ── Detail ── */
  #detail-view { padding-bottom: 24px; }
  #back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--gold);
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 14px 16px; cursor: pointer; width: 100%;
  }
  .detail-hero {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 16px 8px; position: relative;
  }
  .detail-hero-bg {
    position: absolute; inset: 0; opacity: .06;
    background: radial-gradient(circle at center, var(--el-color, var(--gold)) 0%, transparent 70%);
  }
  .detail-sprite {
    image-rendering: pixelated; max-height: 64px; max-width: 90px;
    position: relative; z-index: 1;
  }
  .detail-name {
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--gold); margin-top: 6px; text-align: center;
    line-height: 1.5; position: relative; z-index: 1;
  }
  .detail-id { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .respawn-summary {
    display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;
    font-size: 11px; color: var(--rune-blue); padding: 0 16px 8px; text-align: center;
  }
  .respawn-summary span { display: inline-flex; align-items: center; gap: 4px; }
  .zone-count-link { color: var(--gold) !important; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  .zones-empty-collapsed {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; cursor: pointer;
  }
  .detail-badges { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 16px 10px; }
  .detail-section { padding: 0 16px 12px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .section-header-left { display: flex; align-items: center; gap: 7px; }
  .section-bar { width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }
  .section-title {
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
  }
  .section-action {
    font-size: 10px; color: var(--rune-blue); background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; cursor: pointer;
  }

  /* Admin */
  #admin-btn {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-2); padding: 5px 7px;
    font-size: 12px; cursor: pointer; margin-right: 6px;
  }
  #admin-btn.on { color: var(--gold); border-color: var(--gold-dim); }
  .admin-row { margin-bottom: 14px; }
  .admin-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; display: block; }
  .admin-input {
    width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-1); font-size: 14px; padding: 9px 12px;
    font-family: 'Roboto', sans-serif;
  }
  .admin-toggle {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 14px;
  }
  .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider {
    position: absolute; inset: 0; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 22px; cursor: pointer; transition: .2s;
  }
  .switch-slider::before {
    content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
    background: var(--text-muted); border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .switch-slider { background: #F5A62333; border-color: var(--gold-dim); }
  .switch input:checked + .switch-slider::before { transform: translateX(18px); background: var(--gold); }

  /* Drops clickable */
  .drop-row.clickable { cursor: pointer; }
  .drop-row.clickable:active { border-color: var(--gold); }
  .drop-rate-orig { font-size: 9px; color: var(--text-muted); text-decoration: line-through; margin-right: 4px; }

  /* World map */
  .region-box {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 8px;
  }
  .region-title { font-size: 12px; font-weight: 600; color: var(--text-1); margin-bottom: 8px; }
  .region-desc { font-size: 11px; color: var(--text-2); margin-bottom: 8px; line-height: 1.5; }
  .map-chip {
    display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 11px;
    margin: 0 6px 6px 0; border: 1px solid;
  }
  .map-chip.highlight { color: var(--gold); border-color: var(--gold-dim); background: #F5A62318; font-weight: 600; }
  .map-chip.dim { color: var(--text-muted); border-color: var(--border); }

  /* Stats table */
  .stats-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 14px; border-bottom: 1px solid var(--divider);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 12px; color: var(--text-2); }
  .stat-value { font-size: 12px; font-weight: 600; color: var(--text-1); text-align: right; }

  /* Attr grid */
  .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .attr-box {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .attr-key { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--gold); }
  .attr-val { font-size: 18px; font-weight: 700; color: var(--text-1); }

  /* Elemental bars */
  .el-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .el-label { width: 72px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .el-bar-bg { flex: 1; height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
  .el-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .el-pct { width: 38px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }

  /* Drops */
  .drop-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px; margin-bottom: 7px;
  }
  .drop-icon-box {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-size: 16px;
  }
  .drop-icon-box img { image-rendering: pixelated; max-width: 32px; max-height: 32px; }
  .drop-info { flex: 1; min-width: 0; }
  .drop-name { font-size: 12px; font-weight: 500; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drop-bar-wrap { margin-top: 4px; }
  .drop-bar-bg { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
  .drop-bar-fill { height: 100%; border-radius: 2px; }
  .drop-rate { font-size: 11px; font-weight: 600; flex-shrink: 0; }

  /* Spawn maps */
  .map-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px; margin-bottom: 7px;
  }
  .map-thumb {
    width: 60px; height: 60px; flex-shrink: 0;
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .map-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .map-info { flex: 1; }
  .map-name { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .map-meta { font-size: 11px; color: var(--text-2); margin-top: 3px; }
  .map-type-badge {
    font-size: 10px; color: var(--text-muted); padding: 3px 7px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 4px; flex-shrink: 0;
  }

  /* Mode chips */
  .mode-chip {
    display: inline-block; padding: 5px 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 4px; font-size: 11px; color: var(--text-2);
    margin: 0 6px 6px 0;
  }

  /* ── Bottom nav ── */
  #bottom-nav {
    display: flex; background: var(--bg-card);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 10px 0; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 10px;
    font-family: 'Roboto', sans-serif; transition: color .15s;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Spinner / Error ── */
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-view {
    display: none; flex-direction: column; align-items: center;
    gap: 12px; padding: 48px 24px; text-align: center;
  }
  #error-view p { color: var(--text-2); font-size: 13px; }
  .retry-btn {
    padding: 9px 20px; background: none;
    border: 1px solid var(--gold-dim); border-radius: 6px;
    color: var(--gold); font-size: 12px; cursor: pointer;
    font-family: 'Roboto', sans-serif;
  }
  .empty-msg { text-align: center; color: var(--text-muted); padding: 48px 16px; font-size: 13px; line-height: 1.6; }
  .footer-note { text-align: center; color: var(--text-muted); font-size: 10px; padding: 14px; }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div id="topbar-row">
      <div id="topbar-title">⚔ RO PRE-RENEWAL DB</div>
      <div style="display:flex">
        <button id="admin-btn" onclick="openAdminPanel()" title="Mode admin">⚙️</button>
      </div>
    </div>
    <div id="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="Rechercher…" autocomplete="off">
      <button id="clear-btn" onclick="clearSearch()">✕</button>
    </div>
    <div id="filters"></div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Loading screen -->
    <div id="init-view">
      <div class="init-icon">⚔️</div>
      <div class="init-title">CHARGEMENT</div>
      <div class="init-text" id="init-text">
        Chargement de la base de données (ro_data.json)...
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label"></div>
    </div>

    <div id="list-view">
      <div id="error-view">
        <svg width="40" height="40" fill="none" stroke="#8A5C12" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01M4.98 19.02a10.5 10.5 0 0114.04 0M.99 15.99a15.5 15.5 0 0122.02 0"/>
        </svg>
        <p id="error-msg">Impossible de joindre le serveur.</p>
        <button class="retry-btn" onclick="loadData()">↺ Réessayer</button>
      </div>
      <div id="list-container"></div>
      <div class="footer-note" id="footer-note"></div>
    </div>

    <div id="detail-view"></div>
  </div>

  <!-- Bottom nav -->
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-monsters" onclick="switchTab('monsters')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
      </svg>
      Monstres
    </button>
    <button class="nav-btn" id="nav-items" onclick="switchTab('items')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
      </svg>
      Items
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════════════════
const DATA_URL = 'ro_data.json'; // fichier généré par scanner.html, à côté de index.html
const ADMIN_KEY = 'ro_admin_settings_v1';
const CACHE_KEY = 'ro_db_cache_v5';

// ════════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════════
let DB = { monsters: [], items: [] };
let ADMIN = { enabled: false, globalRateMult: 1, mvpRateMult: 1 };
let state = {
  tab: 'monsters',
  filtered: [],
  query: '',
  filter: null,
  inDetail: false,
  // Pile de navigation pour pouvoir faire "Retour" depuis un drop -> item -> monstre
  navStack: [], // [{type:'monster'|'item', id}]
  currentView: null, // {type, id}
};

function loadAdmin() {
  try {
    const raw = localStorage.getItem(ADMIN_KEY);
    if (raw) ADMIN = { ...ADMIN, ...JSON.parse(raw) };
  } catch (e) {}
}
function saveAdmin() {
  try { localStorage.setItem(ADMIN_KEY, JSON.stringify(ADMIN)); } catch (e) {}
}
function isMvp(m) {
  // Format rAthena (actuel) : m.modes est un tableau plat.
  // Format RagnaAPI (legacy) : m.skills.mode.
  const modes = m.modes || m.skills?.mode || [];
  return modes.includes('mvp');
}
function adjustedRate(monster, rate) {
  const mult = isMvp(monster) ? ADMIN.mvpRateMult : ADMIN.globalRateMult;
  return Math.min(rate * mult, 100);
}


// ════════════════════════════════════════════════════════════════════════════
// HELPERS - traduction / couleurs
// ════════════════════════════════════════════════════════════════════════════
const EL_FR   = { fire:'Fire', water:'Water', wind:'Wind', earth:'Earth', holy:'Holy',
                   shadow:'Shadow', poison:'Poison', undead:'Undead', ghost:'Ghost', neutral:'Neutral' };
const EL_COLOR= { fire:'#E84040', water:'#4096E8', wind:'#48C774', earth:'#A0804A',
                   holy:'#FFF08A', shadow:'#9B59B6', poison:'#2ECC71', undead:'#95A5A6',
                   ghost:'#7F8C8D', neutral:'#BDC3C7' };
const EL_ICON = { fire:'🔥', water:'💧', wind:'🌀', earth:'🌿', holy:'✨',
                   shadow:'🌑', poison:'☠', undead:'💀', ghost:'👻', neutral:'⬜' };
const RACE_FR  = { angel:'Angel', demihuman:'Demi-Human', 'demi-human':'Demi-Human',
                    dragon:'Dragon', formless:'Formless', insect:'Insect',
                    plant:'Plant', undead:'Undead', brute:'Brute', fish:'Fish',
                    demon:'Demon' };
const RACE_COLOR={ angel:'#FFF08A', demihuman:'#E8A040', 'demi-human':'#E8A040',
                    dragon:'#E84040', formless:'#BDC3C7', insect:'#48C774',

// Readable slot name — keeps headgear precision (Upper/Mid/Low)
function slotReadable(locations) {
  if (!locations || locations.length === 0) return '—';
  const loc = locations[0];
  const map = {
    'Upper Headgear': 'Upper Headgear', 'Middle Headgear': 'Mid Headgear',
    'Lower Headgear': 'Lower Headgear', 'Armor': 'Armor',
    'Weapon': 'Weapon', 'Shield': 'Shield',
    'Garment': 'Garment', 'Shoes': 'Shoes',
    'Right Accessory': 'Accessory', 'Left Accessory': 'Accessory',
    'Accessory (Right)': 'Accessory', 'Accessory (Left)': 'Accessory',
    'Two-Handed Weapon': 'Two-Hand Weapon', 'Both_Accessory': 'Accessory',
  };
  return map[loc] || loc;
}

// ── Script bonus translator (English) ────────────────────────────────────────
const STAT_EN = {
  bStr:'STR', bAgi:'AGI', bVit:'VIT', bInt:'INT', bDex:'DEX', bLuk:'LUK',
  bAllStats:'All Stats',
  bMaxHP:'Max HP', bMaxSP:'Max SP', bMaxHPrate:'Max HP', bMaxSPrate:'Max SP',
  bAtk:'ATK', bAtk2:'ATK', bMatk:'MATK', bMatkRate:'MATK',
  bHit:'HIT', bHitRate:'HIT', bFlee:'FLEE', bFlee2:'Perfect Dodge',
  bCritical:'CRIT', bAspd:'ASPD', bAspdRate:'ASPD',
  bDef:'DEF', bDef2:'DEF', bMdef:'MDEF', bMdef2:'MDEF',
  bSpeed:'Move Speed', bCastrate:'Cast Time', bDelayrate:'After-cast Delay',
  bHPrecovRate:'HP Recovery', bSPrecovRate:'SP Recovery',
  bAddItemHealRate:'Potion Heal',
  bUnbreakableWeapon:'Unbreakable Weapon', bUnbreakableArmor:'Unbreakable Armor',
  bUnbreakableHelm:'Unbreakable Helm', bUnbreakableGarment:'Unbreakable Garment',
  bUnbreakableShield:'Unbreakable Shield', bUnbreakableShoes:'Unbreakable Shoes',
  bNoCastCancel:'Uninterruptible Cast',
  bDoubleRate:'Double Attack Chance',
  bAddRace:'Damage vs', bSubRace:'Damage Reduction vs',
  bAddSize:'Damage vs Size', bSubSize:'Damage Reduction vs Size',
  bAddEff:'Chance to inflict', bResEff:'Resistance to',
  bIgnoreDefRace:'Ignore DEF of', bIgnoreMdefRace:'Ignore MDEF of',
  bShortWeaponDamageReturn:'Reflect Melee Damage',
  bLongWeaponDamageReturn:'Reflect Ranged Damage',
};
const RACE_EN = {
  RC_DemiHuman:'Demi-Human', RC_Undead:'Undead', RC_Brute:'Brute',
  RC_Plant:'Plant', RC_Insect:'Insect', RC_Fish:'Fish',
  RC_Demon:'Demon', RC_Dragon:'Dragon', RC_Angel:'Angel',
  RC_Boss:'Boss', RC_NonBoss:'Non-Boss', RC_All:'All Races',
};
const ELE_EN = {
  Ele_Neutral:'Neutral', Ele_Water:'Water', Ele_Earth:'Earth', Ele_Fire:'Fire',
  Ele_Wind:'Wind', Ele_Poison:'Poison', Ele_Holy:'Holy', Ele_Dark:'Shadow',
  Ele_Ghost:'Ghost', Ele_Undead:'Undead',
};

function translateScriptEn(script) {
  if (!script) return null;
  const parts = script.split(';').map(s => s.trim()).filter(Boolean);
  const lines = [];
  for (const part of parts) {
    // bonus bStat,value
    const m1 = part.match(/^bonus\s+(\w+)\s*,\s*(-?\d+)$/);
    // bonus2 bStat,Race/Ele,value
    const m2 = part.match(/^bonus2\s+(\w+)\s*,\s*(\w+)\s*,\s*(-?\d+)$/);
    // bonus bUnbreakableX (no value)
    const m0 = part.match(/^bonus\s+(bUnbreakable\w+)$/);

    if (m0) {
      const label = STAT_EN[m0[1]];
      if (label) { lines.push(label); continue; }
    }
    if (m1) {
      const [, stat, val] = m1;
      const label = STAT_EN[stat];
      if (label) {
        const v = parseInt(val, 10);
        const sign = v >= 0 ? '+' : '';
        const isPct = /rate$/i.test(stat);
        lines.push(`${sign}${v}${isPct ? '%' : ''} ${label}`);
        continue;
      }
    }
    if (m2) {
      const [, stat, arg, val] = m2;
      const label = STAT_EN[stat];
      const argLabel = RACE_EN[arg] || ELE_EN[arg] || arg;
      if (label) {
        const v = parseInt(val, 10);
        const sign = v >= 0 ? '+' : '';
        lines.push(`${sign}${v}% ${label} ${argLabel}`);
        continue;
      }
      // Special case: bSubEle (elemental damage reduction)
      if (stat === 'bSubEle') {
        const eleLabel = ELE_EN[arg] || arg;
        const v = parseInt(val, 10);
        const sign = v >= 0 ? '+' : '';
        lines.push(`${sign}${v}% Resist ${eleLabel}`);
        continue;
      }
    }
    // Not translated — show as-is (compact form)
    lines.push(part);
  }
  return lines.join(' | ');
}

// La source rAthena ne fournit pas d'images -> on retombe sur le pattern
// standard utilisé par les wikis RO (db.irowiki.org), basé sur l'ID.
// Si l'image n'existe pas à cette adresse, le onerror du <img> bascule
// proprement sur l'emoji de repli (géré au niveau de l'affichage).
// Maps monster name -> base ID (lowest ID = v1, has the real sprite)
const _baseIdByName = {};

function monsterImgUrl(monster) {
  if (monster.gif) return monster.gif;
  if (!monster.monster_id) return null;
  // Variants share the same sprite as their v1 counterpart -> use base ID
  const baseId = _baseIdByName[monster.monster_info] || monster.monster_id;
  return `https://db.irowiki.org/image/monster/${baseId}.png`;
}
function itemImgUrl(item) {
  if (item.img) return item.img;
  if (!item.item_id) return null;
  return `https://db.irowiki.org/image/item/${item.item_id}.png`;
}
function dropImgUrl(drop) {
  if (drop.img) return drop.img;
  const matched = findItemByName(drop.name);
  if (matched) return itemImgUrl(matched);
  return null;
}
function modesFr(m) {
  const map = {
    aggressive:'Aggressive', changes_target_if_attacked:'Changes Target',
    assists:'Calls Allies', cast_sensor_idle:'Detects Spells',
    detector:'Detector', boss:'Boss', mvp:'MVP', looter:'Looter',
    plant:'Immobile', canmove:'Can Move', knockbackimmune:'Knockback Immune',
    norandomwalk:'No Random Walk', nocast:'No Cast', fixeditemdrop:'Fixed Drop',
  };
  return map[m] || displayName(m);
}

// ════════════════════════════════════════════════════════════════════════════
// DATA LOADING - charge ro_data.json (généré par scanner.html) une seule fois,
// puis garde une copie en localStorage pour les lancements suivants (offline).
// ════════════════════════════════════════════════════════════════════════════
function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (!parsed.monsters || !parsed.items) return false;
    if (parsed.monsters.length === 0 && parsed.items.length === 0) return false;
    DB = { monsters: parsed.monsters, items: parsed.items };
    return true;
  } catch (e) {
    return false;
  }
}

function saveToCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(DB));
  } catch (e) {
    console.warn('Impossible de sauvegarder en cache local', e);
  }
}

async function loadData() {
  hideError();
  showInitView(true);
  document.getElementById('init-text').textContent =
    `Chargement de ${DATA_URL}...`;
  updateProgress(null);

  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.monsters || !data.items) throw new Error('Format de données invalide');

    DB = { monsters: data.monsters, items: data.items };
    indexDuplicateMonsters();
    saveToCache();
    showInitView(false);
    switchTab(state.tab, true);
  } catch (e) {
    showInitView(false);
    if (loadFromCache()) {
      indexDuplicateMonsters();
      switchTab(state.tab, true);
      return;
    }
    showError(
      `Impossible de charger "${DATA_URL}" (${e.message}). ` +
      `Vérifie que ce fichier est bien présent dans le même dossier que cette page sur GitHub, ` +
      `et que tu l'as généré avec scanner.html.`
    );
  }
}

// Pour chaque monstre qui partage son nom avec un autre, on lui attribue
// un index de variante (1, 2, 3...) basé sur l'ordre croissant des IDs.
// Affichage : "Poring", "Poring (v2)", "Poring (v3)" etc.
function indexDuplicateMonsters() {
  const nameGroups = {};
  for (const m of DB.monsters) {
    const key = m.monster_info;
    if (!nameGroups[key]) nameGroups[key] = [];
    nameGroups[key].push(m);
  }
  for (const group of Object.values(nameGroups)) {
    group.sort((a, b) => a.monster_id - b.monster_id);
    const baseId = group[0].monster_id;
    // Store base ID for image fallback (all variants share the v1 sprite)
    _baseIdByName[group[0].monster_info] = baseId;
    if (group.length < 2) { group[0]._variantIdx = 0; continue; }
    group.forEach((m, i) => { m._variantIdx = i + 1; });
  }
}

function updateProgress(pct) {
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  if (pct == null) {
    fill.style.width = '30%';
    fill.style.animation = 'pulse 1s infinite alternate';
    label.textContent = '';
  } else {
    fill.style.animation = 'none';
    fill.style.width = pct + '%';
    label.textContent = pct + '%';
  }
}

function showInitView(show) {
  document.getElementById('init-view').classList.toggle('show', show);
  document.getElementById('list-view').style.display = show ? 'none' : 'block';
}

// ════════════════════════════════════════════════════════════════════════════
// TAB SWITCH / FILTERS
// ════════════════════════════════════════════════════════════════════════════
function switchTab(tab, force) {
  if (state.tab === tab && !state.inDetail && !force) return;
  state.tab = tab;
  state.filter = null;
  state.query = '';
  state.inDetail = false;
  state.navStack = [];
  state.currentView = null;
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  showList();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  buildFilters();
  applyFilter();
  updateFooterNote();
}

function updateFooterNote() {
  const n = state.tab === 'monsters' ? DB.monsters.length : DB.items.length;
  const label = state.tab === 'monsters' ? 'monstres' : 'items';
  document.getElementById('footer-note').textContent =
    `📦 Base locale : ${n} ${label} chargés`;
}

function buildFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  const items = state.tab === 'monsters'
    ? [null, 'fire','water','wind','earth','holy','shadow','poison','undead','ghost','neutral']
    : [null, 'weapon','armor','card','usable','etc','ammo'];

  items.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (state.filter === f ? ' active' : '');
    const color = f === null ? '#F5A623'
      : state.tab === 'monsters' ? elColor(f) : typeColor(f);
    const label = f === null ? 'Tous'
      : state.tab === 'monsters' ? elFr(f) : typeFr(f);

    if (state.filter === f) {
      btn.style.color = color;
      btn.style.borderColor = color + '99';
      btn.style.background = color + '22';
    }
    btn.textContent = (state.tab === 'monsters' && f) ? `${EL_ICON[f]||''} ${label}` : label;
    btn.onclick = () => { state.filter = f; buildFilters(); applyFilter(); };
    el.appendChild(btn);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// FILTER + RENDER LIST
// ════════════════════════════════════════════════════════════════════════════
function applyFilter() {
  hideError();
  let data = state.tab === 'monsters' ? DB.monsters : DB.items;
  const q = state.query.toLowerCase().trim();

  if (q) {
    data = data.filter(d => {
      const name = (d.monster_info || d.name || '').toLowerCase();
      return name.includes(q) || String(d.monster_id || d.item_id).includes(q);
    });
  }

  if (state.filter) {
    if (state.tab === 'monsters') {
      data = data.filter(d => (d.type || '').toLowerCase() === state.filter);
    } else {
      data = data.filter(d => (d.type || '').toLowerCase() === state.filter);
    }
  }

  // Tri alphabétique
  data = [...data].sort((a, b) => {
    const na = (a.monster_info || a.name || '');
    const nb = (b.monster_info || b.name || '');
    return na.localeCompare(nb);
  });

  state.filtered = data;
  renderList();
}

const RENDER_LIMIT = 80;

function renderList() {
  const container = document.getElementById('list-container');
  container.innerHTML = '';

  // Pas de recherche ni filtre actif : éviter de rendre des centaines de
  // cartes d'un coup (lent sur mobile) — on invite à chercher/filtrer.
  if (!state.query && !state.filter) {
    const total = state.filtered.length;
    container.innerHTML = `<div class="empty-msg">
      🔍 ${total} ${state.tab === 'monsters' ? 'monstres' : 'items'} indexés.<br>
      Tape un nom (ou un ID) dans la recherche, ou choisis un filtre ci-dessus pour afficher la liste.
    </div>`;
    return;
  }

  if (state.filtered.length === 0) {
    container.innerHTML = `<div class="empty-msg">${
      state.query ? `Aucun résultat pour "${state.query}"` : 'Aucun résultat pour ce filtre'
    }</div>`;
    return;
  }

  const toRender = state.filtered.slice(0, RENDER_LIMIT);
  const frag = document.createDocumentFragment();
  toRender.forEach(item => {
    frag.appendChild(state.tab === 'monsters'
      ? buildMonsterCard(item)
      : buildItemCard(item));
  });
  container.appendChild(frag);

  if (state.filtered.length > RENDER_LIMIT) {
    const note = document.createElement('div');
    note.className = 'empty-msg';
    note.textContent = `+ ${state.filtered.length - RENDER_LIMIT} autres résultats — affine ta recherche pour les voir.`;
    container.appendChild(note);
  }
}

function buildMonsterCard(m) {
  const id = m.monster_id;
  const name = displayName(m.monster_info);
  const variantSuffix = m._variantIdx > 1 ? ` <span style="color:var(--text-muted);font-size:10px">(v${m._variantIdx})</span>` : '';
  const el = m.type || 'neutral';
  const color = elColor(el);
  const div = document.createElement('div');
  div.className = 'monster-card';
  div.innerHTML = `
    <div class="sprite-box">
      ${monsterImgUrl(m) ? `<img src="${monsterImgUrl(m)}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='🐾'">` : '🐾'}
    </div>
    <div class="card-info">
      <div class="card-name">${name}${variantSuffix}</div>
      <div class="card-sub">ID: ${id} · Lv.${m.main_stats?.level || '?'}</div>
      <div class="card-chips">
        <span class="chip" style="color:${color};border-color:${color}44;background:${color}18">
          ${EL_ICON[el]||''} ${elFr(el)}
        </span>
        ${m.race ? `<span class="chip" style="color:${raceColor(m.race)};border-color:${raceColor(m.race)}44;background:${raceColor(m.race)}18">${raceFr(m.race)}</span>` : ''}
        ${isMvp(m) ? `<span class="chip" style="color:#FFF08A;border-color:#FFF08A88;background:#FFF08A22;font-weight:700">★ MVP</span>` : (m.modes||[]).includes('boss') ? `<span class="chip" style="color:#E8A040;border-color:#E8A04088;background:#E8A04022">⚡ Mini-Boss</span>` : ''}
      </div>
    </div>
    <svg class="chevron" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  `;
  div.onclick = () => openMonsterDetail(id);
  return div;
}

function buildItemCard(item) {
  const id = item.item_id;
  const name = displayName(item.name);
  const type = item.type || 'etc';
  const color = typeColor(type);
  const div = document.createElement('div');
  div.className = 'monster-card';
  div.innerHTML = `
    <div class="sprite-box">
      ${itemImgUrl(item) ? `<img src="${itemImgUrl(item)}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='📦'">` : '📦'}

    <div class="card-info">
      <div class="card-name">${name}</div>
      <div class="card-sub">ID: ${id}</div>
      <div class="card-chips">
        <span class="chip" style="color:${color};border-color:${color}44;background:${color}18">

    </div>

// ════════════════════════════════════════════════════════════════════════════
// MONSTER DETAIL
// ════════════════════════════════════════════════════════════════════════════
function openMonsterDetail(id) {
  const m = DB.monsters.find(x => x.monster_id === id);
  if (!m) return;
  if (state.currentView) state.navStack.push(state.currentView);
  state.currentView = { type: 'monster', id };
  showDetail();
  renderMonsterDetail(m);
}

function statRow(label, val, color, last=false) {
  return `<div class="stat-row" ${last?'style="border-bottom:none"':''}>
    <span class="stat-label">${label}</span>
    <span class="stat-value" style="color:${color||'var(--text-1)'}">${val ?? '—'}</span>
  </div>`;
}

// Cherche un item correspondant à un nom de drop (même format snake_case que l'API)
function findItemByName(name) {
  if (!name) return null;
  return DB.items.find(i => i.aegis_name === name || i.name === name) || null;
}

        ${statRow('HP', s.hp, '#E84040')}
        ${statRow('Level', s.level, '#F5A623')}
        ${statRow('Attack', s.attack)}
        ${s.magic_attack ? statRow('M.Attack', s.magic_attack) : ''}
        ${statRow('DEF', s.def)}
        ${statRow('M.DEF', s.m_def)}
        ${statRow('Flee', s.flee)}
        ${statRow('Hit', s.hit)}
        ${statRow('ASPD', s.aspd)}
        ${statRow('Speed', s.move_speed)}
        ${statRow('Base EXP', s.base_exp, '#4A90D9')}
        ${statRow('Job EXP', s.job_exp, '#4A90D9', true)}
      </div>
    </div>

    ${elEntries.length ? `
    <div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Elemental Resistance</div></div></div>
      <div class="stats-card" style="padding:12px">
      ${elEntries.map(({k,v}) => {
        const c = elColor(k);
        const fr = elFr(k);
        const pct = Math.min(v/200, 1);
        return `<div class="el-row">
          <div class="el-label" style="color:${c}">${fr}</div>
          <div class="el-bar-bg"><div class="el-bar-fill" style="width:${pct*100}%;background:${v>100?c:'var(--text-muted)'}"></div></div>
          <div class="el-pct" style="color:${v>100?'#E84040':'var(--text-muted)'}">${v}%</div>
        </div>`;
      }).join('')}
      </div>
    </div>` : ''}

    ${drops.length ? `
    <div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Drops</div></div>
      ${ADMIN.enabled && (ADMIN.globalRateMult !== 1 || ADMIN.mvpRateMult !== 1) ? `<span style="font-size:9px;color:var(--gold)">⚙ ×${mvp?ADMIN.mvpRateMult:ADMIN.globalRateMult}</span>` : ''}
      </div>
      ${drops.map(d => {
        const orig = d.rate;
        const pct = adjustedRate(m, orig);
        const adjusted = Math.abs(pct - orig) > 0.0001;
        const barColor = pct>=50?'#E84040':pct>=1?'#F5A623':'#4A90D9';
        const rateColor= pct>=50?'#E84040':pct>=1?'#F5A623':'#8888AA';
        const fmt = (v) => v>=1 ? v.toFixed(2)+'%' : v.toFixed(3)+'%';
        const matchedItem = findItemByName(d.name);
        const clickable = matchedItem ? 'clickable' : '';
        const dataAttr = matchedItem ? `data-item-id="${matchedItem.item_id}"` : '';
        return `<div class="drop-row ${clickable}" ${dataAttr}>
          <div class="drop-icon-box">
            ${dropImgUrl(d)?`<img src="${dropImgUrl(d)}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='📦'">`:'📦'}
          </div>
          <div class="drop-info">
            <div class="drop-name">${displayName(d.name)}${matchedItem?' <span style="color:var(--text-muted)">›</span>':''}</div>
            <div class="drop-bar-wrap">
              <div class="drop-bar-bg"><div class="drop-bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor}"></div></div>
            </div>
          </div>
          <div class="drop-rate" style="color:${rateColor};text-align:right">
            ${adjusted?`<div class="drop-rate-orig">${fmt(orig)}</div>`:''}
            <div>${fmt(pct)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${maps.length ? `
    <div class="detail-section" id="zones-section">
      <div class="section-header">
        <div class="section-header-left"><div class="section-bar"></div><div class="section-title">Spawn Zones</div></div>
      </div>
      ${sortedMaps.map(mp => `<div class="map-row clickable" onclick='openZoneDetail(${JSON.stringify(mp.name)}, ${mp.number||0})'>
        <div class="map-thumb">
          ${mp.img?`<img src="${mp.img}" loading="lazy" onerror="this.parentElement.textContent='🗺'">`:'🗺'}
        </div>
        <div class="map-info">
          <div class="map-name">${displayName(mp.name)}${mp.number?' '+mp.number:''}</div>
          <div class="map-meta">👥 ${mp.amount} monstres · ⏱ ${mp.frequency}</div>
        </div>
        <div class="map-type-badge">${mp.type}</div>
        <span class="chevron" style="margin-left:4px">›</span>
      </div>`).join('')}
    </div>` : `
    <div class="detail-section" id="zones-section">
      <div class="section-header">
        <div class="section-header-left"><div class="section-bar"></div><div class="section-title">Spawn Zones</div></div>
      </div>
      <div class="zones-empty-collapsed" id="zones-empty-toggle" onclick="toggleEmptyZones()">
        <span style="color:var(--text-muted);font-size:12px">No spawn data in current source (rAthena mob_db)</span>
        <span class="chevron" style="color:var(--text-muted)">▾</span>
      </div>
      <div class="empty-msg" id="zones-empty-detail" style="display:none">
        Les zones de spawn ne sont pas fournies par la base rAthena (mob_db.yml ne contient que stats/drops, pas les emplacements de map). Cette information viendra d'une source complémentaire plus tard.
      </div>
    </div>`}

    ${modes.length ? `
    <div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Behavior</div></div></div>
      <div>${modes.map(m=>`<span class="mode-chip">${modesFr(m)}</span>`).join('')}</div>
    </div>` : ''}
  `;
}

function toggleEmptyZones() {
  const detail = document.getElementById('zones-empty-detail');
  const toggle = document.getElementById('zones-empty-toggle');
  const isHidden = detail.style.display === 'none';
  detail.style.display = isHidden ? 'block' : 'none';
  toggle.querySelector('.chevron').textContent = isHidden ? '▴' : '▾';
}

// ════════════════════════════════════════════════════════════════════════════

// quantité décroissante, avec indications de région/warps.
// ════════════════════════════════════════════════════════════════════════════

// Indications factuelles de région + warps approximatifs par préfixe de carte
// (géographie connue de Ragnarok Online pré-renewal).

  { prefixes: ['gef_'], region: 'Rune-Midgarts — Geffen', warp: 'Ville des magiciens, au nord-ouest de Prontera.' },
  { prefixes: ['alb_'], region: 'Rune-Midgarts — Alberta', warp: 'Port au sud-est, Kafra à Alberta.' },
  { prefixes: ['mor_'], region: 'Rune-Midgarts — Morroc', warp: 'Désert au sud-ouest, Kafra à Morroc.' },
  { prefixes: ['comodo'], region: 'Rune-Midgarts — Comodo', warp: 'Ville côtière à l\'ouest, Kafra à Comodo.' },
  { prefixes: ['umbala'], region: 'Rune-Midgarts — Umbala', warp: 'Village isolé, accessible par Payon ou bateau.' },

  { prefixes: ['amatsu'], region: 'Rune-Midgarts — Amatsu', warp: 'Village japonais, accessible par bateau.' },
  { prefixes: ['lou_'], region: 'Rune-Midgarts — Louyang', warp: 'Ville chinoise, accessible par bateau.' },
  { prefixes: ['xmas'], region: 'Rune-Midgarts — Lutie', warp: 'Village enneigé au nord-est de Payon.' },
  { prefixes: ['ra_', 'man_'], region: 'Arunafeltz — Rachel', warp: 'Capitale d\'Arunafeltz, au nord-ouest. Kafra à Rachel.' },
  { prefixes: ['lhz_'], region: 'Arunafeltz — Brasilis / Lighthalzen', warp: 'Ville industrielle, accessible depuis Einbroch ou Rachel.' },

  { prefixes: ['abbey'], region: 'Arunafeltz — Abbaye en ruines', warp: 'Donjon religieux près de Rachel.' },
  { prefixes: ['yuno'], region: 'Schwartzvald — Juno', warp: 'Capitale magique au nord-est. Kafra à Juno.' },

  { prefixes: ['nyd_'], region: 'Schwartzvald — Nidhoggur', warp: 'Donjon de fin de jeu, accessible depuis Juno.' },
  { prefixes: ['jupe_'], region: 'Donjon — Juperos', warp: 'Ruines anciennes, accessible via Comodo/quête.' },
  { prefixes: ['niflheim'], region: 'Donjon — Niflheim', warp: 'Royaume des morts, accessible depuis Glast Heim ou Yuno.' },

  { prefixes: ['moc_'], region: 'Rune-Midgarts — Désert de Morroc', warp: 'Champs/pyramides au sud-ouest de Morroc.' },

  { prefixes: ['que_'], region: 'Zone de quête', warp: 'Carte liée à une quête spécifique.' },
];

function zoneInfo(name) {
  const n = (name || '').toLowerCase();
  for (const z of ZONE_INFO) {
    if (z.prefixes.some(p => n.startsWith(p))) return z;
  }
  return { region: 'Région non répertoriée', warp: 'Vérifie le nom de la carte sur un wiki RO pour les warps exacts.' };
}

function scrollToZones() {
  const el = document.getElementById('zones-section');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openZoneDetail(mapName, mapNumber) {
  if (state.currentView) state.navStack.push(state.currentView);
  state.currentView = { type: 'zone', mapName, mapNumber };
  showDetail();
  renderZoneDetail(mapName, mapNumber);
}

function renderZoneDetail(mapName, mapNumber) {
  // Cherche tous les monstres qui ont cette carte exacte dans leurs spawns
  const monstersHere = [];
  for (const m of DB.monsters) {
    const match = (m.maps || []).find(mp => mp.name === mapName && (mp.number || 0) === (mapNumber || 0));
    if (match) monstersHere.push({ monster: m, spawn: match });
  }
  // Tri par quantité décroissante (le plus de monstres en premier)
  // Tri : MVP/mini-boss (Class:Boss) en premier, puis par quantité décroissante
  // au sein de chaque groupe (le plus nombreux d'abord).
  monstersHere.sort((a, b) => {
    const aBoss = isMvp(a.monster) || (a.monster.modes||[]).includes('boss') ? 1 : 0;
    const bBoss = isMvp(b.monster) || (b.monster.modes||[]).includes('boss') ? 1 : 0;
    if (aBoss !== bBoss) return bBoss - aBoss; // boss/MVP d'abord
    return (Number(b.spawn.amount)||0) - (Number(a.spawn.amount)||0);
  });

  const info = zoneInfo(mapName);
  const sampleImg = monstersHere[0]?.spawn?.img;
  const totalMonsters = monstersHere.reduce((sum, x) => sum + (Number(x.spawn.amount)||0), 0);

  const dv = document.getElementById('detail-view');
  dv.innerHTML = `
    <button id="back-btn" onclick="goBack()">← Back</button>

    <div class="detail-hero">
      <div class="map-thumb" style="width:90px;height:90px;margin:0 auto">
        ${sampleImg?`<img src="${sampleImg}" onerror="this.parentElement.textContent='🗺'">`:'🗺'}
      </div>
      <div class="detail-name">${displayName(mapName)}${mapNumber?' '+mapNumber:''}</div>
      <div class="detail-id">${monstersHere.length} espèce${monstersHere.length>1?'s':''} · ${totalMonsters} monstres au total</div>
    </div>

    <div class="detail-section">
      <div class="region-box">
        <div class="region-title">📍 ${info.region}</div>
        <div class="region-desc">🧭 ${info.warp}</div>
      </div>
    </div>

    <div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Monsters in this zone</div></div></div>
      ${monstersHere.length === 0 ? `<div class="empty-msg">Aucun autre monstre trouvé pour cette carte dans la base.</div>` :
        monstersHere.map(({monster: m2, spawn}) => {
          const el2 = m2.type || 'neutral';
          const c2 = elColor(el2);
          const mvp2 = isMvp(m2);
          return `<div class="monster-card" onclick="openMonsterDetail(${m2.monster_id})">
            <div class="sprite-box">
              ${m2.gif?`<img src="${m2.gif}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='🐾'">`:'🐾'}
            </div>
            <div class="card-info">
              <div class="card-name">${displayName(m2.monster_info)}${mvp2?' ★':''}</div>
              <div class="card-sub">👥 ${spawn.amount} · ⏱ ${spawn.frequency}</div>
              <div class="card-chips">
                <span class="chip" style="color:${c2};border-color:${c2}44;background:${c2}18">${EL_ICON[el2]||''} ${elFr(el2)}</span>
              </div>
            </div>
            <svg class="chevron" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
          </div>`;
        }).join('')
      }
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════════════
// ITEM DETAIL
// ════════════════════════════════════════════════════════════════════════════
function openItemDetail(id) {
  const item = DB.items.find(x => x.item_id === id);
  if (!item) return;
  if (state.currentView) state.navStack.push(state.currentView);
  state.currentView = { type: 'item', id };
  showDetail();
  renderItemDetail(item);
}

function renderItemDetail(item) {
  const name = displayName(item.name);
  const type = item.type || 'etc';
  const color = typeColor(type);
  const bonus = item.bonus || {};
  const bonusEntries = Object.entries(bonus);
  const dv = document.getElementById('detail-view');

  // For CARDS: only show the slot chip in badges (no full Equipment section)
  // For WEAPONS/ARMORS: show the full Equipment section
  const isCard = type === 'card';
  const slotLabel = slotReadable(item.locations);
  let equipHtml = '';
  if (item.is_equip && !isCard) {
    const jobs = (item.jobs || []).join(', ') || '—';
    const classes = (item.classes || []).join(', ') || '—';
    equipHtml = `<div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Equipment</div></div></div>
      <div class="stats-card">
        ${statRow('Slot', slotLabel)}
        ${item.defense!=null?statRow('Defense', item.defense):''}
        ${item.attack!=null?statRow('Attack', item.attack):''}
        ${item.weapon_range!=null?statRow('Range', item.weapon_range):''}
        ${item.weapon_level!=null?statRow('Weapon Level', item.weapon_level):''}
        ${statRow('Slots', item.slots || 0)}
        ${statRow('Refineable', item.refineable ? 'Yes' : 'No')}
        ${item.gender?statRow('Gender', item.gender):''}
        ${statRow('Jobs', jobs)}
        ${statRow('Classes', classes, null, true)}
      </div>
    </div>`;
  }

  dv.innerHTML = `
    <button id="back-btn" onclick="goBack()">← Back</button>
    <div class="detail-hero">
      <div class="detail-hero-bg" style="--el-color:${color}"></div>
      ${itemImgUrl(item)?`<img class="detail-sprite" src="${itemImgUrl(item)}" style="max-height:80px" onerror="this.style.display='none'">`:'<div style="font-size:48px;position:relative">📦</div>'}
      <div class="detail-name">${name}</div>
      <div class="detail-id">ID : ${item.item_id}</div>
    </div>
    <div class="detail-badges">
      <span class="chip" style="color:${color};border-color:${color}55;background:${color}18">${typeFr(type)}</span>
      ${item.required_level?`<span class="chip" style="color:var(--gold);border-color:var(--gold-dim);background:#F5A62315">Lv. ${item.required_level}</span>`:''}
      ${item.slots?`<span class="chip" style="color:var(--text-2);border-color:var(--border)">${item.slots} slot${item.slots>1?'s':''}</span>`:''}
      ${isCard && slotLabel !== '—' ? `<span class="chip" style="color:var(--gold);border-color:var(--gold)88;background:var(--gold)22;font-size:12px;padding:5px 12px">🃏 ${slotLabel} Card</span>` : ''}
      ${!isCard && slotLabel !== '—' ? `<span class="chip" style="color:var(--rune-blue);border-color:var(--rune-blue)55;background:var(--rune-blue)18">${slotLabel}</span>` : ''}
    </div>
    ${item.description?`<div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Description</div></div></div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text-2);line-height:1.6">${translateScriptEn(item.description) || item.description}</div>
    </div>`:''}
    ${equipHtml}
    <div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Info</div></div></div>
      <div class="stats-card">
        ${item.weight!=null?statRow('Weight', (item.weight/10)+' w'):''}
        ${item.buy_price!=null?statRow('Buy Price', item.buy_price+' z', '#F5A623'):''}
        ${item.sell_price!=null?statRow('Sell Price', item.sell_price+' z', '#8A5C12'):''}
        ${!item.weight && !item.buy_price && !item.sell_price ? statRow('Details', 'Not available', null, true) : ''}
      </div>
    </div>
    ${bonusEntries.length?`<div class="detail-section">
      <div class="section-header"><div class="section-header-left"><div class="section-bar"></div><div class="section-title">Bonus</div></div></div>
      <div class="stats-card">
        ${bonusEntries.map(([k,v],i)=>statRow(k, JSON.stringify(v),'#48C774', i===bonusEntries.length-1)).join('')}
      </div>
    </div>`:''}
  `;
}

// ════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════════════
function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  state.inDetail = false;
}
function showDetail() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('content').scrollTop = 0;
  state.inDetail = true;
}
function goBack() {
  if (state.navStack.length > 0) {
    const prev = state.navStack.pop();
    state.currentView = prev;
    if (prev.type === 'monster') {
      const m = DB.monsters.find(x => x.monster_id === prev.id);
      if (m) renderMonsterDetail(m); else goBack();
    } else if (prev.type === 'item') {
      const it = DB.items.find(x => x.item_id === prev.id);
      if (it) renderItemDetail(it); else goBack();
    } else if (prev.type === 'zone') {
      renderZoneDetail(prev.mapName, prev.mapNumber);
    } else if (prev.type === 'admin') {
      renderAdminPanel();
    } else {
      showList();
    }
    document.getElementById('content').scrollTop = 0;
    return;
  }
  state.currentView = null;
  showList();
  document.getElementById('content').scrollTop = 0;
}
function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-view').style.display = 'flex';
  document.getElementById('list-container').innerHTML = '';
}
function hideError() {
  document.getElementById('error-view').style.display = 'none';
}

// ════════════════════════════════════════════════════════════════════════════
// EVENT DELEGATION — clic sur les drops (équipements, cartes, usables...)
// Utilise data-item-id plutôt que des onclick inline, pour être totalement
// robuste face aux caractères spéciaux (apostrophes, guillemets) dans les
// noms d'objets qui pourraient casser un attribut HTML généré dynamiquement.
// ════════════════════════════════════════════════════════════════════════════
document.getElementById('detail-view').addEventListener('click', (e) => {
  const row = e.target.closest('[data-item-id]');
  if (row) {
    const id = parseInt(row.getAttribute('data-item-id'), 10);
    if (!isNaN(id)) openItemDetail(id);
  }
});

// ════════════════════════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════════════════════════
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  state.query = this.value;
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    // Si on tape une recherche depuis l'écran de détail, on revient à la liste.
    if (state.inDetail) {
      state.currentView = null;
      state.navStack = [];
      showList();
    }
    applyFilter();
  }, 200);
});
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  state.query = '';
  applyFilter();
}

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════
(async function init() {
  loadAdmin();
  document.getElementById('admin-btn').classList.toggle('on', ADMIN.enabled);
  buildFilters();
  // On essaie toujours de charger ro_data.json (peut avoir été mis à jour),
  // avec repli automatique sur le cache local si le réseau échoue.
  await loadData();
})();
</script>
