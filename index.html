<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D1A">
<title>RO Pre-Renewal DB</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #0D0D1A;
    --bg-card:    #141428;
    --bg-elevated:#1C1C38;
    --gold:       #F5A623;
    --gold-dim:   #8A5C12;
    --rune-blue:  #4A90D9;
    --border:     #2A2A4A;
    --divider:    #1E1E3A;
    --text-1:     #E8E8F0;
    --text-2:     #8888AA;
    --text-muted: #444466;
    --fire:   #E84040; --water: #4096E8; --wind:  #48C774;
    --earth:  #A0804A; --holy:  #FFF08A; --shadow:#9B59B6;
    --poison: #2ECC71; --undead:#95A5A6; --ghost: #7F8C8D;
    --neutral:#BDC3C7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg-deep); color: var(--text-1); font-family: 'Roboto', sans-serif; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #topbar {
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  #topbar-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  #refresh-btn {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-2); padding: 5px 8px;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  #search-bar {
    display: flex;
    align-items: center;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    margin-bottom: 10px;
  }
  #search-bar svg { color: var(--text-muted); flex-shrink: 0; }
  #search-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-1); font-size: 14px; padding: 10px 8px;
    font-family: 'Roboto', sans-serif;
  }
  #search-input::placeholder { color: var(--text-muted); }
  #clear-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: none; }

  /* Filtres */
  #filters {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
    scrollbar-width: none;
  }
  #filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 11px;
    border: 1px solid var(--border); background: var(--bg-elevated);
    color: var(--text-2); cursor: pointer; transition: all .15s; white-space: nowrap;
    font-family: 'Roboto', sans-serif;
  }
  .filter-chip.active { font-weight: 600; }

  /* ── Content ── */
  #content { flex: 1; overflow-y: auto; }
  #list-view, #detail-view, #init-view { min-height: 100%; }
  #detail-view, #init-view { display: none; }

  /* ── Init / indexing screen ── */
  #init-view {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center; min-height: 60vh;
  }
  #init-view.show { display: flex; }
  .init-icon { font-size: 40px; margin-bottom: 16px; }
  .init-title {
    font-family: 'Press Start 2P', monospace; font-size: 11px;
    color: var(--gold); margin-bottom: 10px; letter-spacing: 1px;
  }
  .init-text { font-size: 13px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; max-width: 320px; }
  .progress-bar-bg {
    width: 100%; max-width: 280px; height: 8px; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 10px;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold); border-radius: 4px; width: 0%;
    transition: width .15s;
  }
  @keyframes pulse { from { opacity: .4; } to { opacity: 1; } }
  .progress-label { font-size: 11px; color: var(--text-muted); }

  /* ── Liste ── */
  #list-container { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .monster-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; cursor: pointer;
    transition: border-color .15s;
  }
  .monster-card:active { border-color: var(--gold); }
  .sprite-box {
    width: 58px; height: 58px; flex-shrink: 0;
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-size: 22px;
  }
  .sprite-box img { image-rendering: pixelated; max-width: 52px; max-height: 52px; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .card-chips { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
  .chevron { color: var(--text-muted); flex-shrink: 0; }

  /* ── Chips ── */
  .chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    border: 1px solid; white-space: nowrap;
  }

  /* ── Detail ── */
  #detail-view { padding-bottom: 24px; }
  #back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--gold);
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 14px 16px; cursor: pointer; width: 100%;
  }
  .detail-hero {
    display: flex; flex-direction: column; align-items: center;
    padding: 16px; position: relative;
  }
  .detail-hero-bg {
    position: absolute; inset: 0; opacity: .06;
    background: radial-gradient(circle at center, var(--el-color, var(--gold)) 0%, transparent 70%);
  }
  .detail-sprite {
    image-rendering: pixelated; max-height: 110px; max-width: 150px;
    position: relative; z-index: 1;
  }
  .detail-name {
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    color: var(--gold); margin-top: 10px; text-align: center;
    line-height: 1.6; position: relative; z-index: 1;
  }
  .detail-id { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .respawn-summary {
    display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;
    font-size: 12px; color: var(--rune-blue); padding: 0 16px 12px; text-align: center;
  }
  .respawn-summary span { display: inline-flex; align-items: center; gap: 4px; }
  .detail-badges { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 16px; }
  .detail-section { padding: 0 16px 20px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-header-left { display: flex; align-items: center; gap: 7px; }
  .section-bar { width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }
  .section-title {
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
  }
  .section-action {
    font-size: 10px; color: var(--rune-blue); background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; cursor: pointer;
  }

  /* Admin */
  #admin-btn {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-2); padding: 5px 7px;
    font-size: 12px; cursor: pointer; margin-right: 6px;
  }
  #admin-btn.on { color: var(--gold); border-color: var(--gold-dim); }
  .admin-row { margin-bottom: 14px; }
  .admin-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; display: block; }
  .admin-input {
    width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-1); font-size: 14px; padding: 9px 12px;
    font-family: 'Roboto', sans-serif;
  }
  .admin-toggle {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 14px;
  }
  .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider {
    position: absolute; inset: 0; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 22px; cursor: pointer; transition: .2s;
  }
  .switch-slider::before {
    content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
    background: var(--text-muted); border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .switch-slider { background: #F5A62333; border-color: var(--gold-dim); }
  .switch input:checked + .switch-slider::before { transform: translateX(18px); background: var(--gold); }

  /* Drops clickable */
  .drop-row.clickable { cursor: pointer; }
  .drop-row.clickable:active { border-color: var(--gold); }
  .drop-rate-orig { font-size: 9px; color: var(--text-muted); text-decoration: line-through; margin-right: 4px; }

  /* World map */
  .region-box {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 8px;
  }
  .region-title { font-size: 12px; font-weight: 600; color: var(--text-1); margin-bottom: 8px; }
  .region-desc { font-size: 11px; color: var(--text-2); margin-bottom: 8px; line-height: 1.5; }
  .map-chip {
    display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 11px;
    margin: 0 6px 6px 0; border: 1px solid;
  }
  .map-chip.highlight { color: var(--gold); border-color: var(--gold-dim); background: #F5A62318; font-weight: 600; }
  .map-chip.dim { color: var(--text-muted); border-color: var(--border); }

  /* Stats table */
  .stats-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 14px; border-bottom: 1px solid var(--divider);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 13px; color: var(--text-2); }
  .stat-value { font-size: 13px; font-weight: 600; color: var(--text-1); text-align: right; }

  /* Attr grid */
  .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .attr-box {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .attr-key { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--gold); }
  .attr-val { font-size: 18px; font-weight: 700; color: var(--text-1); }

  /* Elemental bars */
  .el-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .el-label { width: 72px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .el-bar-bg { flex: 1; height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
  .el-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .el-pct { width: 38px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }

  /* Drops */
  .drop-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px; margin-bottom: 7px;
  }
  .drop-icon-box {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-size: 16px;
  }
  .drop-icon-box img { image-rendering: pixelated; max-width: 32px; max-height: 32px; }
  .drop-info { flex: 1; min-width: 0; }
  .drop-name { font-size: 12px; font-weight: 500; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drop-bar-wrap { margin-top: 4px; }
  .drop-bar-bg { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
  .drop-bar-fill { height: 100%; border-radius: 2px; }
  .drop-rate { font-size: 11px; font-weight: 600; flex-shrink: 0; }

  /* Spawn maps */
  .map-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px; margin-bottom: 7px;
  }
  .map-thumb {
    width: 60px; height: 60px; flex-shrink: 0;
    background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .map-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .map-info { flex: 1; }
  .map-name { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .map-meta { font-size: 11px; color: var(--text-2); margin-top: 3px; }
  .map-type-badge {
    font-size: 10px; color: var(--text-muted); padding: 3px 7px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 4px; flex-shrink: 0;
  }

  /* Mode chips */
  .mode-chip {
    display: inline-block; padding: 5px 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 4px; font-size: 11px; color: var(--text-2);
    margin: 0 6px 6px 0;
  }

  /* ── Bottom nav ── */
  #bottom-nav {
    display: flex; background: var(--bg-card);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 10px 0; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 10px;
    font-family: 'Roboto', sans-serif; transition: color .15s;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Spinner / Error ── */
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-view {
    display: none; flex-direction: column; align-items: center;
    gap: 12px; padding: 48px 24px; text-align: center;
  }
  #error-view p { color: var(--text-2); font-size: 13px; }
  .retry-btn {
    padding: 9px 20px; background: none;
    border: 1px solid var(--gold-dim); border-radius: 6px;
    color: var(--gold); font-size: 12px; cursor: pointer;
    font-family: 'Roboto', sans-serif;
  }
  .empty-msg { text-align: center; color: var(--text-muted); padding: 48px 16px; font-size: 13px; line-height: 1.6; }
  .footer-note { text-align: center; color: var(--text-muted); font-size: 10px; padding: 14px; }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div id="topbar-row">
      <div id="topbar-title">⚔ RO PRE-RENEWAL DB</div>
      <div style="display:flex">
        <button id="admin-btn" onclick="openAdminPanel()" title="Mode admin">⚙️</button>
      </div>
    </div>
    <div id="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="Rechercher…" autocomplete="off">
      <button id="clear-btn" onclick="clearSearch()">✕</button>
    </div>
    <div id="filters"></div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Loading screen -->
    <div id="init-view">
      <div class="init-icon">⚔️</div>
      <div class="init-title">CHARGEMENT</div>
      <div class="init-text" id="init-text">
        Chargement de la base de données (ro_data.json)...
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label"></div>
    </div>

    <div id="list-view">
      <div id="error-view">
        <svg width="40" height="40" fill="none" stroke="#8A5C12" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01M4.98 19.02a10.5 10.5 0 0114.04 0M.99 15.99a15.5 15.5 0 0122.02 0"/>
        </svg>
        <p id="error-msg">Impossible de joindre le serveur.</p>
        <button class="retry-btn" onclick="loadData()">↺ Réessayer</button>
      </div>
      <div id="list-container"></div>
      <div class="footer-note" id="footer-note"></div>
    </div>

    <div id="detail-view"></div>
  </div>

  <!-- Bottom nav -->
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-monsters" onclick="switchTab('monsters')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
      </svg>
      Monstres
    </button>
    <button class="nav-btn" id="nav-items" onclick="switchTab('items')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
      </svg>
      Items
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════════════════
const DATA_URL = 'ro_data.json'; // fichier généré par scanner.html, à côté de index.html
const ADMIN_KEY = 'ro_admin_settings_v1';
const CACHE_KEY = 'ro_db_cache_v5';

// ════════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════════
let DB = { monsters: [], items: [] };
let ADMIN = { enabled: false, globalRateMult: 1, mvpRateMult: 1 };
let state = {
  tab: 'monsters',
  filtered: [],
  query: '',
  filter: null,
  inDetail: false,
  // Pile de navigation pour pouvoir faire "Retour" depuis un drop -> item -> monstre
  navStack: [], // [{type:'monster'|'item', id}]
  currentView: null, // {type, id}
};

function loadAdmin() {
  try {
    const raw = localStorage.getItem(ADMIN_KEY);
    if (raw) ADMIN = { ...ADMIN, ...JSON.parse(raw) };
  } catch (e) {}
}
function saveAdmin() {
  try { localStorage.setItem(ADMIN_KEY, JSON.stringify(ADMIN)); } catch (e) {}
}
function isMvp(m) {
  return !!(m.skills?.mode || []).includes('mvp');
}
function adjustedRate(monster, rate) {
  const mult = isMvp(monster) ? ADMIN.mvpRateMult : ADMIN.globalRateMult;
  return Math.min(rate * mult, 100);
}


// ════════════════════════════════════════════════════════════════════════════
// HELPERS - traduction / couleurs
// ════════════════════════════════════════════════════════════════════════════
const EL_FR   = { fire:'Feu', water:'Eau', wind:'Vent', earth:'Terre', holy:'Sacré',
                   shadow:'Ombre', poison:'Poison', undead:'Mort-vivant', ghost:'Fantôme', neutral:'Neutre' };
const EL_COLOR= { fire:'#E84040', water:'#4096E8', wind:'#48C774', earth:'#A0804A',
                   holy:'#FFF08A', shadow:'#9B59B6', poison:'#2ECC71', undead:'#95A5A6',
                   ghost:'#7F8C8D', neutral:'#BDC3C7' };
const EL_ICON = { fire:'🔥', water:'💧', wind:'🌀', earth:'🌿', holy:'✨',
                   shadow:'🌑', poison:'☠', undead:'💀', ghost:'👻', neutral:'⬜' };
const RACE_FR  = { angel:'Ange', demihuman:'Demi-humain', 'demi-human':'Demi-humain',
                    dragon:'Dragon', formless:'Sans forme', insect:'Insecte',
                    plant:'Plante', undead:'Mort-vivant', brute:'Brute', fish:'Poisson' };
const RACE_COLOR={ angel:'#FFF08A', demihuman:'#E8A040', 'demi-human':'#E8A040',
                    dragon:'#E84040', formless:'#BDC3C7', insect:'#48C774',
                    plant:'#27AE60', undead:'#95A5A6', brute:'#A0804A', fish:'#4096E8' };
const TYPE_COLOR={ weapon:'#E84040', armor:'#4A90D9', card:'#F5A623',
                    usable:'#48C774', etc:'#8888AA', ammo:'#BDC3C7' };
const TYPE_FR  = { weapon:'Arme', armor:'Armure', card:'Carte',
                    usable:'Consommable', etc:'Divers', ammo:'Munition' };

function elColor(e){ return EL_COLOR[e?.toLowerCase()] || '#BDC3C7'; }
function elFr(e)   { return EL_FR[e?.toLowerCase()] || e || 'Neutre'; }
function raceFr(r) { return RACE_FR[r?.toLowerCase()] || r; }
function raceColor(r){ return RACE_COLOR[r?.toLowerCase()] || '#8888AA'; }
function typeColor(t){ return TYPE_COLOR[t?.toLowerCase()] || '#8888AA'; }
function typeFr(t) { return TYPE_FR[t?.toLowerCase()] || t || '?'; }
function displayName(n){ return (n||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function modesFr(m) {
  const map = { aggressive:'Agressif', changes_target_if_attacked:'Change de cible si attaqué',
    assists:'Appelle des alliés', cast_sensor_idle:'Détecte les sorts',
    detector:'Détecteur', boss:'Boss', mvp:'MVP', looter:'Looteur', plant:'Immobile' };
  return map[m] || displayName(m);
}

// ════════════════════════════════════════════════════════════════════════════
// DATA LOADING - charge ro_data.json (généré par scanner.html) une seule fois,
// puis garde une copie en localStorage pour les lancements suivants (offline).
// ════════════════════════════════════════════════════════════════════════════
function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (!parsed.monsters || !parsed.items) return false;
    if (parsed.monsters.length === 0 && parsed.items.length === 0) return false;
    DB = { monsters: parsed.monsters, items: parsed.items };
    return true;
  } catch (e) {
    return false;
  }
}

function saveToCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(DB));
  } catch (e) {
    console.warn('Impossible de sauvegarder en cache local', e);
  }
}

async function loadData() {
  hideError();
  showInitView(true);
  document.getElementById('init-text').textContent =
    `Chargement de ${DATA_URL}...`;
  updateProgress(null);

  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.monsters || !data.items) throw new Error('Format de données invalide');

    DB = { monsters: data.monsters, items: data.items };
    saveToCache();
    showInitView(false);
    switchTab(state.tab, true);
  } catch (e) {
    showInitView(false);
    // Si le fichier distant échoue mais qu'on a un cache local, on l'utilise.
    if (loadFromCache()) {
      switchTab(state.tab, true);
      return;
    }
    showError(
      `Impossible de charger "${DATA_URL}" (${e.message}). ` +
      `Vérifie que ce fichier est bien présent dans le même dossier que cette page sur GitHub, ` +
      `et que tu l'as généré avec scanner.html.`
    );
  }
}

function updateProgress(pct) {
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  if (pct == null) {
    fill.style.width = '30%';
    fill.style.animation = 'pulse 1s infinite alternate';
    label.textContent = '';
  } else {
    fill.style.animation = 'none';
    fill.style.width = pct + '%';
    label.textContent = pct + '%';
  }
}

function showInitView(show) {
  document.getElementById('init-view').classList.toggle('show', show);
  document.getElementById('list-view').style.display = show ? 'none' : 'block';
}

// ════════════════════════════════════════════════════════════════════════════
// TAB SWITCH / FILTERS
// ════════════════════════════════════════════════════════════════════════════
function switchTab(tab, force) {
  if (state.tab === tab && !state.inDetail && !force) return;
  state.tab = tab;
  state.filter = null;
  state.query = '';
  state.inDetail = false;
  state.navStack = [];
  state.currentView = null;
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  showList();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  buildFilters();
  applyFilter();
  updateFooterNote();
}

function updateFooterNote() {
  const n = state.tab === 'monsters' ? DB.monsters.length : DB.items.length;
  const label = state.tab === 'monsters' ? 'monstres' : 'items';
  document.getElementById('footer-note').textContent =
    `📦 Base locale : ${n} ${label} chargés`;
}

function buildFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  const items = state.tab === 'monsters'
    ? [null, 'fire','water','wind','earth','holy','shadow','poison','undead','ghost','neutral']
    : [null, 'weapon','armor','card','usable','etc','ammo'];

  items.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (state.filter === f ? ' active' : '');
    const color = f === null ? '#F5A623'
      : state.tab === 'monsters' ? elColor(f) : typeColor(f);
    const label = f === null ? 'Tous'
      : state.tab === 'monsters' ? elFr(f) : typeFr(f);

    if (state.filter === f) {
      btn.style.color = color;
      btn.style.borderColor = color + '99';
      btn.style.background = color + '22';
    }
    btn.textContent = (state.tab === 'monsters' && f) ? `${EL_ICON[f]||''} ${label}` : label;
    btn.onclick = () => { state.filter = f; buildFilters(); applyFilter(); };
    el.appendChild(btn);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// FILTER + RENDER LIST
// ════════════════════════════════════════════════════════════════════════════
function applyFilter() {
  hideError();
  let data = state.tab === 'monsters' ? DB.monsters : DB.items;
  const q = state.query.toLowerCase().trim();

  if (q) {
    data = data.filter(d => {
      const name = (d.monster_info || d.name || '').toLowerCase();
      return name.includes(q) || String(d.monster_id || d.item_id).includes(q);
    });
  }

  if (state.filter) {
    if (state.tab === 'monsters') {
      data = data.filter(d => (d.type || '').toLowerCase() === state.filter);
    } else {
      data = data.filter(d => (d.type || '').toLowerCase() === state.filter);
    }
  }

  // Tri alphabétique
  data = [...data].sort((a, b) => {
    const na = (a.monster_info || a.name || '');
    const nb = (b.monster_info || b.name || '');
    return na.localeCompare(nb);
  });

  state.filtered = data;
  renderList();
}

const RENDER_LIMIT = 80;

function renderList() {
  const container = document.getElementById('list-container');
  container.innerHTML = '';

  // Pas de recherche ni filtre actif : éviter de rendre des centaines de
  // cartes d'un coup (lent sur mobile) — on invite à chercher/filtrer.
  if (!state.query && !state.filter) {
    const total = state.filtered.length;
    container.innerHTML = `<div class="empty-msg">
      🔍 ${total} ${state.tab === 'monsters' ? 'monstres' : 'items'} indexés.<br>
      Tape un nom (ou un ID) dans la recherche, ou choisis un filtre ci-dessus pour afficher la liste.
    </div>`;
    return;
  }

  if (state.filtered.length === 0) {
    container.innerHTML = `<div class="empty-msg">${
      state.query ? `Aucun résultat pour "${state.query}"` : 'Aucun résultat pour ce filtre'
    }</div>`;
    return;
  }

  const toRender = state.filtered.slice(0, RENDER_LIMIT);
  const frag = document.createDocumentFragment();
  toRender.forEach(item => {
    frag.appendChild(state.tab === 'monsters'
      ? buildMonsterCard(item)
      : buildItemCard(item));
  });
  container.appendChild(frag);

  if (state.filtered.length > RENDER_LIMIT) {
    const note = document.createElement('div');
    note.className = 'empty-msg';
    note.textContent = `+ ${state.filtered.length - RENDER_LIMIT} autres résultats — affine ta recherche pour les voir.`;
    container.appendChild(note);
  }
}

function openMonsterDetail(id) {
  const m = DB.monsters.find(x => x.monster_id === id);

function statRow(label, val, color, last=false) {

    <span class="stat-label">${label}</span>

// Cherche un item correspondant à un nom de drop (même format snake_case que l'API)

  if (!name) return null;
  return DB.items.find(i => i.name === name) || null;

// ════════════════════════════════════════════════════════════════════════════
// WORLD MAP (vue simplifiée par région)
// ════════════════════════════════════════════════════════════════════════════
// Catégorise un nom de map RO dans une grande région du monde (géographie
// factuelle du jeu : Rune-Midgarts au sud, Schwartzvald au nord-est,
// Arunafeltz au nord-ouest, + zones spéciales/donjons).
function mapRegion(name) {
  const n = (name || '').toLowerCase();
  const regions = [
    { key: 'arunafeltz', label: 'Arunafeltz States (nord-ouest)',
      desc: 'Capitale : Rachel. Régions enneigées du nord-ouest.',
      prefixes: ['ra_', 'man_', 'lhz_', 'dic_', 'mid_camp', 'abbey'] },
    { key: 'schwartzvald', label: 'République de Schwartzvald (nord-est)',
      desc: 'Capitale : Juno (Yuno). Tours et académies magiques.',
      prefixes: ['yuno', 'kh_', 'thana', 'nyd_', 'gefenia'] },
    { key: 'donjons', label: 'Donjons de fin de jeu',
      desc: 'Juperos, Thanatos Tower, Nidhoggur, Niflheim, Glast Heim profond...',
      prefixes: ['jupe_', 'niflheim', 'gl_', 'abyss', 'beach_dun'] },
    { key: 'rune-midgarts', label: 'Royaume de Rune-Midgarts (sud)',
      desc: 'Capitale : Prontera. La plus grande région, climats variés.',
      prefixes: ['prt_', 'pay_', 'mjo_', 'gef_', 'alb_', 'mor_', 'comodo',
                  'umbala', 'ayo', 'amatsu', 'lou_', 'xmas', 'que_', 'iz_',
                  'in_', 'sec_', 'tur_', 'mosk', 'spl_'] },
  ];
  for (const r of regions) {
    if (r.prefixes.some(p => n.startsWith(p))) return r;
  }
  return { key: 'autre', label: 'Autres zones', desc: 'Îles, zones spéciales ou instances.', prefixes: [] };
}

function openWorldMap(monsterName, mapEntries) {
  if (state.currentView) state.navStack.push(state.currentView);
  state.currentView = { type: 'worldmap' };
  showDetail();
  renderWorldMap(monsterName, mapEntries);
}

function renderWorldMap(monsterName, mapEntries) {
  const dv = document.getElementById('detail-view');

  // Regroupe les zones de spawn par région
  const byRegion = {};
  for (const mp of mapEntries) {
    const r = mapRegion(mp.name);
    if (!byRegion[r.key]) byRegion[r.key] = { ...r, maps: [] };
    byRegion[r.key].maps.push(mp);
  }
  const regionKeys = Object.keys(byRegion);

  dv.innerHTML = `
    <button id="back-btn" onclick="goBack()">← Retour</button>
    <div class="detail-hero">
      <div style="font-size:40px">🗺</div>
      <div class="detail-name">CARTE DU MONDE</div>
      <div class="detail-id">Zones de spawn — ${displayName(monsterName)}</div>
    </div>
    <div class="detail-section">
      ${regionKeys.map(key => {
        const r = byRegion[key];
        return `<div class="region-box">
          <div class="region-title">📍 ${r.label}</div>
          <div class="region-desc">${r.desc}</div>
          <div>${r.maps.map(mp => `<span class="map-chip highlight">${displayName(mp.name)}${mp.number?' '+mp.number:''}</span>`).join('')}</div>
        </div>`;
      }).join('')}
      <div class="empty-msg" style="padding:16px 0 0">
        ℹ️ Vue simplifiée par région (pas de carte image — données factuelles uniquement).
      </div>
    </div>
  `;
}

  dv.innerHTML = `
    <button id="back-btn" onclick="goBack()">← Retour</button>
    <div class="detail-hero">
      <div class="detail-hero-bg" style="--el-color:${color}"></div>
      ${item.img?`<img class="detail-sprite" src="${item.img}" style="max-height:80px" onerror="this.style.display='none'">`:'<div style="font-size:48px;position:relative">📦</div>'}
      <div class="detail-name">${name}</div>
      <div class="detail-id">ID : ${item.item_id}</div>
    </div>
    <div class="detail-badges">
      <span class="chip" style="color:${color};border-color:${color}55;background:${color}18">${typeFr(type)}</span>
      ${item.required_level?`<span class="chip" style="color:var(--gold);border-color:var(--gold-dim);background:#F5A62315">Nv. ${item.required_level}</span>`:''}
    </div>
    ${item.description?`<div class="detail-section">
      <div class="section-header"><div class="section-bar"></div><div class="section-title">Description</div></div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text-2);line-height:1.6">${item.description}</div>
    </div>`:''}
    <div class="detail-section">
      <div class="section-header"><div class="section-bar"></div><div class="section-title">Infos</div></div>
      <div class="stats-card">
        ${item.weight!=null?statRow('Poids', (item.weight/10)+' w'):''}
        ${item.buy_price!=null?statRow('Prix achat', item.buy_price+' z', '#F5A623'):''}
        ${item.sell_price!=null?statRow('Prix vente', item.sell_price+' z', '#8A5C12'):''}
        ${!item.weight && !item.buy_price && !item.sell_price ? statRow('Détails', 'Non disponibles', null, true) : ''}
      </div>
    </div>
    ${bonusEntries.length?`<div class="detail-section">
      <div class="section-header"><div class="section-bar"></div><div class="section-title">Bonus</div></div>
      <div class="stats-card">
        ${bonusEntries.map(([k,v],i)=>statRow(k, JSON.stringify(v),'#48C774', i===bonusEntries.length-1)).join('')}
      </div>
    </div>`:''}
  `;
}

// ════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════════════
function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  state.inDetail = false;
}
function showDetail() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('content').scrollTop = 0;
  state.inDetail = true;
}
function goBack() {
  if (state.navStack.length > 0) {
    const prev = state.navStack.pop();
    state.currentView = prev;
    if (prev.type === 'monster') {
      const m = DB.monsters.find(x => x.monster_id === prev.id);
      if (m) renderMonsterDetail(m); else goBack();
    } else if (prev.type === 'item') {
      const it = DB.items.find(x => x.item_id === prev.id);
      if (it) renderItemDetail(it); else goBack();
    } else {
      showList();
    }
    document.getElementById('content').scrollTop = 0;
    return;
  }
  state.currentView = null;
  showList();
  document.getElementById('content').scrollTop = 0;
}
function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-view').style.display = 'flex';
  document.getElementById('list-container').innerHTML = '';
}
function hideError() {
  document.getElementById('error-view').style.display = 'none';
}

// ════════════════════════════════════════════════════════════════════════════
// ADMIN PANEL — multiplicateurs de taux de drop
// ════════════════════════════════════════════════════════════════════════════
function openAdminPanel() {
  if (state.currentView) state.navStack.push(state.currentView);
  state.currentView = { type: 'admin' };
  showDetail();
  renderAdminPanel();
}

function renderAdminPanel() {
  const dv = document.getElementById('detail-view');
  dv.innerHTML = `
    <button id="back-btn" onclick="goBack()">← Retour</button>
    <div class="detail-hero">
      <div style="font-size:40px">⚙️</div>
      <div class="detail-name">MODE ADMIN</div>
      <div class="detail-id">Ajuste les taux de drop affichés</div>
    </div>
    <div class="detail-section">
      <div class="admin-toggle">
        <div>
          <div style="font-size:13px;color:var(--text-1);font-weight:600">Activer le mode admin</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Applique les multiplicateurs ci-dessous aux taux affichés</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="admin-enabled" ${ADMIN.enabled?'checked':''} onchange="updateAdminEnabled(this.checked)">
          <span class="switch-slider"></span>
        </label>
      </div>

      <div class="admin-row">
        <label class="admin-label">Multiplicateur global (monstres normaux)</label>
        <input class="admin-input" type="number" step="0.1" min="0" id="admin-global"
          value="${ADMIN.globalRateMult}" onchange="updateAdminValue('globalRateMult', this.value)">
      </div>

      <div class="admin-row">
        <label class="admin-label">Multiplicateur spécifique aux MVP ★</label>
        <input class="admin-input" type="number" step="0.1" min="0" id="admin-mvp"
          value="${ADMIN.mvpRateMult}" onchange="updateAdminValue('mvpRateMult', this.value)">
      </div>

      <div class="empty-msg" style="padding:8px 0">
        ℹ️ Ex: 2 = double tous les taux affichés (plafonné à 100%). 1 = taux d'origine de RagnaAPI.
        Les MVP sont détectés automatiquement via leur mode "mvp".
      </div>
    </div>
  `;
}

function updateAdminEnabled(checked) {
  ADMIN.enabled = checked;
  saveAdmin();
  document.getElementById('admin-btn').classList.toggle('on', checked);
}
function updateAdminValue(key, value) {
  const v = parseFloat(value);
  ADMIN[key] = isNaN(v) || v < 0 ? 1 : v;
  saveAdmin();
}

// ════════════════════════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════════════════════════
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  state.query = this.value;
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 200);
});
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  state.query = '';
  applyFilter();
}

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════
(async function init() {
  loadAdmin();
  document.getElementById('admin-btn').classList.toggle('on', ADMIN.enabled);
  buildFilters();
  // On essaie toujours de charger ro_data.json (peut avoir été mis à jour),
  // avec repli automatique sur le cache local si le réseau échoue 1.
  await loadData();
})();
</script>
